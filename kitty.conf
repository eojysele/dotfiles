#Font
font_family      Iosevka Nerd Font Mono Regular
bold_font        Iosevka Nerd Font Mono Medium
italic_font      Iosevka Nerd Font Mono Italic
bold_italic_font Iosevka Nerd Font Mono Medium Italic
font_size 15.0
disable_ligatures always

cursor_shape block

scrollback_lines 5000
shell_integration no-cursor
macos_show_window_title_in window
mouse_hide_wait 1.0

#Tab Bar
tab_bar_edge bottom
tab_bar_align center
tab_bar_min_tabs 2
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style fade
tab_fade 1 1 1 1
tab_title_template "{index} {tab.active_exe}"
active_tab_font_style normal
inactive_tab_font_style normal

#Keyboard shortcuts
map cmd+right next_tab
map cmd+left previous_tab
map cmd+t new_tab
map cmd+w close_tab
map cmd+shift+right move_tab_forward
map cmd+shift+left move_tab_backward
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9


# The basic colors
foreground              #C6D0F5
background              #303446
selection_foreground    #303446
selection_background    #F2D5CF

# Cursor colors
cursor                  #F2D5CF
cursor_text_color       #303446

# URL underline color when hovering with mouse
url_color               #F2D5CF

# Kitty window border colors
active_border_color     #BABBF1
inactive_border_color   #737994
bell_border_color       #E5C890

# OS Window titlebar colors
wayland_titlebar_color #303446
macos_titlebar_color #303446

# Tab bar colors
active_tab_foreground   #232634
active_tab_background   #CA9EE6
inactive_tab_foreground #C6D0F5
inactive_tab_background #292C3C
tab_bar_background      #303446

# Colors for marks (marked text in the terminal)
mark1_foreground #303446
mark1_background #BABBF1
mark2_foreground #303446
mark2_background #CA9EE6
mark3_foreground #303446
mark3_background #85C1DC

