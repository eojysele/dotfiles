unbind r
bind r source-file ~/.tmux.conf
set -g mouse on
set -g default-terminal "alacritty"
#set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -sg escape-time 10
set -g focus-events on
set -g history-limit 5000
set -g base-index 1
set -g pane-base-index 1

#Key binding
unbind t
bind t new-window

unbind w
bind w kill-window

unbind j
bind j select-pane -D

unbind k
bind k select-pane -U

unbind h
bind h select-pane -L

unbind l
bind l select-pane -R

unbind <
bind < swap-window -d -t -1

unbind >
bind > swap-window -d -t +1

#Catppuccin Frappe
thm_bg="#303446"
thm_fg="#c6d0f5"
thm_cyan="#99d1db"
thm_black="#292c3c"
thm_gray="#414559"
thm_magenta="#ca9ee6"
thm_pink="#f4b8e4"
thm_red="#e78284"
thm_green="#a6d189"
thm_yellow="#e5c890"
thm_blue="#8caaee"
thm_orange="#ef9f76"
thm_black4="#626880"

#Status bar settings
set -g status-position top
set -g status-justify centre
set -g status-style fg=$thm_fg,bold,bg=$thm_black
set -g window-status-style fg=$thm_black,bg=$thm_fg
set -g window-status-format ' #I #W '
set -g window-status-current-style fg=$thm_black,bg=$thm_magenta
set -g window-status-current-format ' #I #W '
set -g status-right " #S  "
set -g status-right-style fg=$thm_black,bg=$thm_blue
set -g status-left "  #S "
set -g status-left-style fg=$thm_black,bg=$thm_blue
