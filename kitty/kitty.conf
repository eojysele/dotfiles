#Font
font_family      Iosevka Nerd Font Mono Regular
bold_font        Iosevka Nerd Font Mono Medium
italic_font      Iosevka Nerd Font Mono Italic
bold_italic_font Iosevka Nerd Font Mono Medium Italic
font_size 15.0
disable_ligatures always

cursor_shape block

scrollback_lines 5000
shell_integration no-cursor
macos_show_window_title_in window
mouse_hide_wait 1.0
confirm_os_window_close -1

#Tab Bar
tab_bar_edge top
tab_bar_align center
tab_bar_min_tabs 2
tab_bar_margin_width 0.0
tab_bar_margin_height 0.0 0.0
tab_bar_style slant
tab_title_template "    {index} {tab.active_exe}    "
active_tab_font_style bold
inactive_tab_font_style bold

#Colors
include colors.conf

#OS specific configs
include macos.conf
include linux.conf
